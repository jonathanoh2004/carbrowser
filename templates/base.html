<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CarBrowser</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        nav { margin-bottom: 20px; }
        nav a { margin-right: 15px; text-decoration: none; color: #333; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        h1, h2 { color: #222; }
        table { border-collapse: collapse; width: 100%; background: white; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; font-size: 13px; }
        th { background: #eee; }
        form { margin: 10px 0; }
        input, select, textarea { padding: 5px; margin: 3px; font-size: 13px; }
        button { padding: 5px 10px; font-size: 13px; cursor: pointer; }
        .section { background: white; padding: 15px; margin-bottom: 20px; border: 1px solid #ddd; }
        .stat { display: inline-block; margin-right: 20px; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/cars">Browse Cars</a>
        <a href="/lists">Lists</a>
        <a href="/users">Users</a>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
